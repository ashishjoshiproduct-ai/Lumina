<!DOCTYPE html>
<html>
  <head>
    <title>Lumina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #1a1a1a;
        background: #faf9f7;
        margin: 0;
        padding: 0;
      }
      .wrap { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }
      h1 { font-size: 28px; font-weight: 600; margin: 0 0 4px; }
      .tagline { color: #6b6b6b; font-size: 15px; margin: 0 0 28px; }
      .upload-row {
        background: #fff; border: 1px solid #e6e3dd; border-radius: 12px;
        padding: 18px 20px; margin-bottom: 28px;
      }
      .upload-row p { margin: 0 0 10px; font-size: 14px; color: #6b6b6b; }
      .welcome { color: #1d7a55; font-size: 14px; margin: 0 0 14px; min-height: 18px; }
      .reader {
        background: #fff; border: 1px solid #e6e3dd; border-radius: 12px;
        padding: 40px 48px; min-height: 320px; margin-bottom: 20px;
      }
      .reader p {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 18px; line-height: 1.8; color: #2a2a2a; margin: 0; max-width: 62ch;
      }
      .section-heading {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 21px; font-weight: 700; color: #1a1a1a;
        margin: 0 0 16px; max-width: 62ch;
      }
      .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      button {
        font-size: 14px; padding: 9px 18px; border: 1px solid #d4d0c8;
        background: #fff; border-radius: 8px; cursor: pointer;
      }
      button:hover { background: #f3f1ec; }
      button:disabled { opacity: 0.4; cursor: default; }
      .position { color: #8a8a8a; font-size: 13px; margin-left: 6px; }
      .jump { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #6b6b6b; }
      .jump input { width: 64px; padding: 7px 8px; border: 1px solid #d4d0c8; border-radius: 8px; font-size: 14px; }
      @media (max-width: 600px) {
        .reader { padding: 24px 20px; }
        .reader p { font-size: 17px; }
        .jump { margin-left: 0; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">

      <h1>Lumina</h1>
      <p class="tagline">Read actively. Understand deeply.</p>

      <div class="upload-row">
        <p>Upload a PDF to start reading.</p>
        <input type="file" id="file-input" accept=".pdf" onchange="loadPdf()">
      </div>

      <p class="welcome" id="welcome"></p>

      <div class="reader">
        <div id="chunk-text"><p>Your reading will appear here.</p></div>
      </div>

      <div class="controls">
        <button id="prev-btn" onclick="showPreviousChunk()">Previous</button>
        <button id="next-btn" onclick="showNextChunk()">Next</button>
        <span class="position" id="position">—</span>
        <span class="jump">
          Jump to section
          <input type="number" id="jump-input" min="1" placeholder="#"
                 onkeydown="if(event.key==='Enter'){jumpToChunk();}">
          <button onclick="jumpToChunk()">Go</button>
        </span>
      </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      var chunks = [];
      var currentChunk = 0;
      var pdfName = "";

      function median(nums) {
        if (nums.length === 0) return 0;
        var s = nums.slice().sort(function(a, b) { return a - b; });
        var mid = Math.floor(s.length / 2);
        return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function heightOf(item) {
        return item.height || Math.abs(item.transform[3]) || 0;
      }

      function groupIntoLines(items) {
        var arr = items.filter(function(it) { return it.str && it.str.trim().length > 0; });
        var heights = arr.map(heightOf).filter(function(h) { return h > 0; });
        var medH = median(heights) || 10;
        var tol = Math.max(2, medH * 0.5);

        arr.sort(function(a, b) {
          var dy = b.transform[5] - a.transform[5];
          if (Math.abs(dy) > 2) return dy;
          return a.transform[4] - b.transform[4];
        });

        var lines = [];
        var cur = null;
        arr.forEach(function(it) {
          var y = it.transform[5];
          if (cur && Math.abs(cur.y - y) <= tol) {
            cur.items.push(it);
          } else {
            if (cur) lines.push(cur);
            cur = { y: y, items: [it] };
          }
        });
        if (cur) lines.push(cur);
        return { lines: lines, medH: medH };
      }

      function lineToBlock(line, medH) {
        var freq = {};
        line.items.forEach(function(it) {
          var h = Math.round(heightOf(it) * 2) / 2;
          freq[h] = (freq[h] || 0) + (it.str.length || 1);
        });
        var domH = Number(Object.keys(freq).sort(function(a, b) {
          return freq[b] - freq[a];
        })[0]) || medH;

        var kept = line.items.filter(function(it) {
          var h = heightOf(it);
          var s = it.str.trim();
          var isFootnoteMarker = /^[\d][\d,\u2013\-]{0,4}$/.test(s);
          if (isFootnoteMarker && h < domH * 0.85) return false;
          return true;
        });

        var text = kept.map(function(it) { return it.str; }).join(" ")
                       .replace(/\s+/g, " ").trim();
        return { size: domH, text: text };
      }

      function computeBodySize(blocks) {
        var weight = {};
        blocks.forEach(function(b) {
          var sz = Math.round(b.size);
          weight[sz] = (weight[sz] || 0) + b.text.length;
        });
        var best = Object.keys(weight).sort(function(a, b) {
          return weight[b] - weight[a];
        })[0];
        return Number(best) || 10;
      }

      function buildChunks(blocks) {
        var bodySize = computeBodySize(blocks);
        var out = [];
        var curHeading = "";
        var buf = [];

        function flush() {
          if (buf.length > 0) {
            out.push({ heading: curHeading, text: buf.join(" ") });
            buf = [];
          }
        }

        blocks.forEach(function(b, idx) {
          var words = b.text.split(" ").length;
          var isHeading = b.size >= bodySize * 1.2 && words <= 14 && b.text.length < 120;

          if (isHeading) {
            flush();
            curHeading = b.text;
            var next = blocks[idx + 1];
            var nextWords = next ? next.text.split(" ").length : 0;
            var nextIsHeading = next && next.size >= bodySize * 1.2 && nextWords <= 14;
            if (!next || nextIsHeading) {
              out.push({ heading: curHeading, text: "" });
            }
          } else {
            b.text.split(" ").forEach(function(w) {
              if (w) buf.push(w);
              if (buf.length >= 150) flush();
            });
          }
        });
        flush();
        return out;
      }

      async function loadPdf() {
        var file = document.getElementById("file-input").files[0];
        if (!file) return;

        pdfName = file.name;
        document.getElementById("chunk-text").innerHTML = "<p>Reading…</p>";

        var data = await file.arrayBuffer();
        var pdf = await pdfjsLib.getDocument({ data: data }).promise;

        var allBlocks = [];
        for (var i = 1; i <= pdf.numPages; i++) {
          var page = await pdf.getPage(i);
          var content = await page.getTextContent();

          var items = content.items.filter(function(item) {
            return Math.abs(item.transform[0]) >= Math.abs(item.transform[1]);
          });

          var grouped = groupIntoLines(items);
          grouped.lines.forEach(function(line) {
            var block = lineToBlock(line, grouped.medH);
            if (block.text.length > 0) allBlocks.push(block);
          });
        }

        chunks = buildChunks(allBlocks);

        var saved = localStorage.getItem("lumina-progress-" + pdfName);
        if (saved !== null && Number(saved) < chunks.length) {
          currentChunk = Number(saved);
          document.getElementById("welcome").innerText =
            "Welcome back — picking up where you left off.";
        } else {
          currentChunk = 0;
          document.getElementById("welcome").innerText = "";
        }

        showChunk();
      }

      function saveProgress() {
        localStorage.setItem("lumina-progress-" + pdfName, currentChunk);
      }

      function showChunk() {
        var c = chunks[currentChunk] || { heading: "", text: "" };
        var html = "";
        if (c.heading) html += '<h2 class="section-heading">' + escapeHtml(c.heading) + '</h2>';
        if (c.text) html += '<p>' + escapeHtml(c.text) + '</p>';
        if (!c.heading && !c.text) html += '<p>(empty section)</p>';
        document.getElementById("chunk-text").innerHTML = html;

        document.getElementById("position").innerText =
          "Section " + (currentChunk + 1) + " of " + chunks.length;
        document.getElementById("prev-btn").disabled = (currentChunk === 0);
        document.getElementById("next-btn").disabled = (currentChunk === chunks.length - 1);
      }

      function showNextChunk() {
        if (currentChunk < chunks.length - 1) {
          currentChunk = currentChunk + 1;
          saveProgress();
          showChunk();
        }
      }

      function showPreviousChunk() {
        if (currentChunk > 0) {
          currentChunk = currentChunk - 1;
          saveProgress();
          showChunk();
        }
      }

      function jumpToChunk() {
        var input = document.getElementById("jump-input");
        var target = Number(input.value) - 1;
        if (chunks.length === 0) return;
        if (isNaN(target) || target < 0 || target >= chunks.length) {
          input.value = "";
          input.placeholder = "1-" + chunks.length;
          return;
        }
        currentChunk = target;
        saveProgress();
        showChunk();
        input.value = "";
      }
    </script>

  </body>
</html>
